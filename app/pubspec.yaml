name: dindinvani_nani
description: App financeiro para casal Vani e Nani
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.0

  # Estado - Riverpod
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navegacao
  go_router: ^14.6.2

  # Graficos
  fl_chart: ^0.69.2

  # Formatacao BR (R\$, datas)
  intl: ^0.20.2

  # Env
  flutter_dotenv: ^5.2.1

  # Firebase (notificacoes)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Storage
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^18.0.1
  flutter_secure_storage: ^9.2.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  equatable: ^2.0.7

  # Clean Architecture
  dartz: ^0.10.1

  # Utilitarios
  logger: ^2.5.0
  connectivity_plus: ^6.1.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.3
  # custom_lint: ^0.7.0   # DESABILITADO: causava conflito analyzer_plugin
  # riverpod_lint: ^2.6.3   # DESABILITADO: causava conflito analyzer_plugin

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/


