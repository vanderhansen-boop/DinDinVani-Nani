name: Supabase Keep-Alive

on:
  schedule:
    # A cada 6 dias as 12:00 UTC (free tier pausa em ~7 dias inativo)
    - cron: '0 12 */6 * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Secrets nao configurados. Pulando."
            exit 0
          fi
          echo "Pingando Supabase..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/categories?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "Supabase ativo (status $STATUS). OK."
          else
            echo "Falha no ping (status $STATUS)."
            exit 1
          fi